<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Vrefos — an on-device baby activity tracker for parents. Track feedings and sleep, get reminders, keep everything private on your phone.">
    <title>Vrefos</title>
    <style>
        :root {
            color-scheme: light dark;
            --bg: #fafaf9;
            --text: #1c1917;
            --muted: #57534e;
            --border: #e7e5e4;
            --accent: #0d9488;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1c1917;
                --text: #fafaf9;
                --muted: #a8a29e;
                --border: #44403c;
                --accent: #2dd4bf;
            }
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            color: var(--text);
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            line-height: 1.65;
        }
        main {
            max-width: 36rem;
            padding: 2rem 1.25rem;
            text-align: center;
        }
        h1 { font-size: 2.4rem; margin: 0 0 0.5rem; }
        p { color: var(--muted); margin: 0 0 1.75rem; }
        nav a {
            display: inline-block;
            margin: 0.25rem 0.5rem;
            padding: 0.6rem 1.2rem;
            border: 1px solid var(--border);
            border-radius: 0.6rem;
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }
        nav a:hover { border-color: var(--accent); }
    </style>
</head>
<body>
<main>
    <h1>Vrefos</h1>
    <p>An on-device baby activity tracker for parents — log feedings and
    sleep, get gentle reminders, and keep everything private on your phone.</p>
    <nav>
        <a href="privacy-policy.html">Privacy Policy</a>
        <a href="https://github.com/maliouris/vrefos">Source on GitHub</a>
    </nav>
</main>
</body>
</html>
